---
- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true

- name: Upgrade packages
  ansible.builtin.apt:
    upgrade: dist

- name: Install common packages
  ansible.builtin.apt:
    name:
      - curl
      - wget
      - git
      - unzip
      - htop
      - nano
      - tmux
      - ncdu
      - ca-certificates
      - gnupg
      - unattended-upgrades
    state: present

- name: Enable unattended upgrades
  ansible.builtin.service:
    name: unattended-upgrades
    enabled: true
    state: started

- name: Set timezone
  community.general.timezone:
    name: "{{ common_timezone }}"
